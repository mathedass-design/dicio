<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Dicionário</title>
    <link rel="shortcut icon" type="image/png" href="logo.png?v=3">
    <link rel="icon" type="image/png" href="logo.png?v=3">
    <link rel="apple-touch-icon" href="logo.png?v=3">
    
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #f8fafc;
            --primaria: #8b5cf6; 
            --primaria-hover: #7c3aed;
            --texto: #1f2937;
            --branco: #ffffff;
            --sombra: rgba(0,0,0,0.08);
            --input-bg: #f8fafc;
            --input-border: #e2e8f0;
        }

        body.dark-mode {
            --bg: #0f172a;
            --branco: #1e293b;
            --texto: #f8fafc;
            --sombra: rgba(0,0,0,0.5);
            --input-bg: #0f172a;
            --input-border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }

        body { 
            background-color: var(--bg); color: var(--texto); overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column;
        }

        .header-app {
            background: var(--primaria); color: #ffffff;
            padding: 15px 40px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 100; flex-shrink: 0;
            display: grid; grid-template-columns: 250px 1fr auto;
            gap: 20px; align-items: center;
        }
        .header-app h1 { font-size: 24px; font-weight: 900; display: flex; align-items: center; gap: 10px;}

        .centro-header { display: flex; justify-content: center; }
        .busca-box { 
            display: flex; background: var(--branco); border-radius: 12px; 
            padding: 8px 20px; width: 100%; max-width: 600px; transition: background 0.3s;
        }
        .busca-box input { 
            border: none; outline: none; font-size: 16px; width: 100%; margin-left: 10px; 
            color: var(--texto); background: transparent; 
        }
        
        .acoes-topo { display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        
        .paginacao { display: flex; gap: 6px; }
        .btn-pag { 
            background: rgba(255,255,255,0.2); border: none; padding: 6px 12px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; color: #ffffff; transition: 0.2s; font-size: 13px;
        }
        .btn-pag:hover { background: rgba(255,255,255,0.4); }
        .btn-pag.ativo { background: #ffffff; color: var(--primaria); }

        .btn-tema {
            background: rgba(255,255,255,0.2); color: #ffffff; border: none;
            width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-tema:hover { background: rgba(255,255,255,0.4); }

        .container {
            width: 100%;
            max-width: 1600px; margin: 0 auto; padding: 20px;
            display: grid; gap: 20px; grid-template-columns: 1fr;
            flex-grow: 1; overflow: hidden; min-height: 0; 
        }

        .card-add { 
            background: var(--branco); padding: 25px; border-radius: 20px; 
            box-shadow: 0 5px 15px var(--sombra); transition: background 0.3s;
        }
        .card-add h2 { color: var(--primaria); margin-bottom: 20px; font-size: 20px; display: flex; align-items: center; gap: 8px;}

        .inputs-container { display: flex; flex-direction: column; }
        
        .campo-grupo { display: flex; flex-direction: column; margin-bottom: 15px; }
        .toolbar-formato {
            display: flex; gap: 5px; background: var(--input-bg); border: 2px solid var(--input-border);
            border-bottom: none; padding: 6px 10px; border-radius: 10px 10px 0 0; width: 100%;
        }
        .btn-formato {
            background: transparent; border: none; color: var(--texto);
            width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 15px; font-family: serif;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-formato:hover { background: rgba(0,0,0,0.1); }
        body.dark-mode .btn-formato:hover { background: rgba(255,255,255,0.1); }
        
        input.campo, .div-editor {
            width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid var(--input-border);
            border-radius: 10px; font-size: 16px; background: var(--input-bg); color: var(--texto); transition: 0.3s;
        }
        
        .div-editor {
            resize: vertical;
            min-height: 80px;
            overflow-y: auto;
            white-space: pre-wrap;
            cursor: text;
            outline: none;
        }
        .div-editor:empty:before {
            content: attr(placeholder);
            color: #9ca3af;
            pointer-events: none;
            display: block;
        }
        
        .campo-grupo .div-editor { 
            border-top-left-radius: 0; border-top-right-radius: 0; border-top: 1px dashed var(--input-border); margin-bottom: 0; 
        }
        
        input.campo:focus, .div-editor:focus { border-color: var(--primaria); outline: none; background: var(--branco);}

        button.btn-add {
            width: 100%; background: var(--primaria); color: #ffffff; border: none;
            padding: 16px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: transform 0.1s, background 0.3s; margin-top: auto;
        }
        button.btn-add:active { transform: scale(0.98); }
        button.btn-add:hover { background: var(--primaria-hover); }

        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 900;
        }
        .btn-flutuante {
            background: var(--primaria);
            color: #ffffff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: none; 
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-flutuante:hover {
            transform: scale(1.1);
            background: var(--primaria-hover);
        }
        body.dark-mode .btn-flutuante {
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }

        @media (min-width: 900px) {
            .container { 
                grid-template-columns: 320px 1fr; 
                grid-template-rows: 1fr; 
                align-items: stretch; 
            }
            .card-add { height: 100%; display: flex; flex-direction: column; }
            .inputs-container { flex-grow: 1; display: flex; flex-direction: column; }
            
            .campo-grupo-exemplo { flex-grow: 1; display: flex; flex-direction: column; }
            #exemplo { flex-grow: 1; resize: none; }
            
            .painel-lista-wrapper { 
                width: 100%; 
                height: 100%; 
                overflow: hidden; 
                display: flex; flex-direction: column; 
            }
            
            .grid-view { 
                display: grid; gap: 20px; flex-grow: 1; 
                width: 100%; height: 100%; 
                grid-template-columns: repeat(3, minmax(0, 1fr));
                grid-template-rows: repeat(3, minmax(0, 1fr)); 
            }
        }

        ul { list-style: none; }
        
        .card {
            border-radius: 16px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            position: relative; transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column;
            height: 100%; overflow: hidden; cursor: pointer; 
        }
        .grid-view .card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        
        .empty-card {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px;}
        
        .card-palavra { font-size: 20px; font-weight: 900; color: #111827; word-break: break-word; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .card-significado { 
            font-size: 15px; color: #374151; margin-bottom: 10px; line-height: 1.4; 
            overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }
        .card-exemplo {
            background: rgba(255,255,255,0.5); padding: 10px; border-radius: 10px;
            font-style: italic; color: #374151; font-size: 13px;
            flex-grow: 1; overflow: hidden;
            white-space: pre-wrap; 
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-box {
            position: relative; 
            background: var(--branco); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; transition: background 0.3s;
        }
        .btn-fechar-x {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.05); color: var(--texto); border: none;
            width: 32px; height: 32px; border-radius: 50%;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-fechar-x:hover { background: #ef4444; color: #ffffff; }

        .modal-box h3 { margin-bottom: 20px; color: var(--primaria); margin-right: 30px;} 
        .btn-cancelar {
            width: 100%; background: var(--input-border); color: var(--texto); border: none;
            padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-cancelar:hover { opacity: 0.8; }

        .comp-palavra { font-size: 26px; font-weight: 900; margin-bottom: 15px; color: #111827; margin-right: 30px;}
        .comp-significado { font-size: 18px; line-height: 1.6; margin-bottom: 20px; color: #111827; white-space: pre-wrap; }
        .comp-exemplo { background: rgba(255,255,255,0.6); padding: 15px; border-radius: 12px; font-style: italic; font-size: 16px; color: #374151; white-space: pre-wrap;}

        .card-acoes { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-acao {
            background: rgba(0,0,0,0.1); border: none; padding: 10px 15px;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; color: #111827;
            transition: background 0.2s; display: flex; align-items: center; gap: 4px;
        }
        .btn-acao:hover { background: rgba(0,0,0,0.2); }

        @media (max-width: 899px) {
            body { overflow-y: auto; height: auto; }
            .header-app { grid-template-columns: 1fr; padding: 15px 20px; gap: 15px; text-align: center; }
            .acoes-topo { justify-content: center; flex-wrap: wrap; }
            .card-add { height: auto; }
            .painel-lista-wrapper { overflow: visible; height: auto; }
            .grid-view { 
                display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
                grid-auto-rows: 250px; height: auto; gap: 15px;
            }
            .fab-container { bottom: 20px; right: 20px; gap: 10px; }
            .btn-flutuante { width: 45px; height: 45px; font-size: 16px; }
        }
    </style>
</head>
<body>
    
    <script>
        if(localStorage.getItem('temaNoturno') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <header class="header-app">
        <h1>☁️ Dicionário</h1>
        
        <div class="centro-header">
            <div class="busca-box">
                <span>🔍</span>
                <input type="text" id="campoBusca" oninput="filtrarLista()" placeholder="Buscar...">
            </div>
        </div>
        
        <div class="acoes-topo">
            <div class="paginacao" id="paginacao"></div>
            <button class="btn-tema" id="btnTema" onclick="toggleTema()" title="Modo Noturno">🌙</button>
        </div>
    </header>

    <div class="container">
        <div class="card-add">
            <h2>✨ Qual a nova?</h2>
            <div class="inputs-container">
                <input type="text" id="palavra" class="campo" placeholder="Digite uma nova palavra">
                
                <div class="campo-grupo">
                    <div class="toolbar-formato">
                        <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('bold', false, null)" title="Negrito"><b>B</b></button>
                        <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('italic', false, null)" title="Itálico"><i>I</i></button>
                        <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('strikeThrough', false, null)" title="Tachado"><s>S</s></button>
                    </div>
                    <div id="significado" class="campo div-editor" contenteditable="true" placeholder="Significado..."></div>
                </div>

                <div class="campo-grupo campo-grupo-exemplo" style="margin-bottom: 20px;">
                    <div class="toolbar-formato">
                        <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('bold', false, null)" title="Negrito"><b>B</b></button>
                        <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('italic', false, null)" title="Itálico"><i>I</i></button>
                        <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('strikeThrough', false, null)" title="Tachado"><s>S</s></button>
                    </div>
                    <div id="exemplo" class="campo div-editor" contenteditable="true" placeholder="Exemplo de uso..."></div>
                </div>

            </div>
            <button class="btn-add" onclick="salvarNaNuvem()">Salvar</button>
        </div>

        <div class="painel-lista-wrapper">
            <ul id="minhaLista" class="grid-view"></ul>
        </div>
    </div>

    <div class="fab-container" id="fabPaginacao">
        <button class="btn-flutuante" id="fabPrev" onclick="mudarPagina(-1)" title="Página Anterior">&#10094;</button>
        <button class="btn-flutuante" id="fabNext" onclick="mudarPagina(1)" title="Próxima Página">&#10095;</button>
    </div>

    <div class="modal-overlay" id="modalEdicao">
        <div class="modal-box">
            <button class="btn-fechar-x" onclick="fecharModal('modalEdicao')">✖</button>
            <h3>✏️ Editar Palavra</h3>
            <input type="hidden" id="editRow">
            <input type="text" id="editPalavra" class="campo">
            
            <div class="campo-grupo">
                <div class="toolbar-formato">
                    <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('bold', false, null)"><b>B</b></button>
                    <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('italic', false, null)"><i>I</i></button>
                    <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('strikeThrough', false, null)"><s>S</s></button>
                </div>
                <div id="editSignificado" class="campo div-editor" contenteditable="true"></div>
            </div>

            <div class="campo-grupo" style="margin-bottom: 20px;">
                <div class="toolbar-formato">
                    <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('bold', false, null)"><b>B</b></button>
                    <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('italic', false, null)"><i>I</i></button>
                    <button type="button" class="btn-formato" onmousedown="event.preventDefault(); document.execCommand('strikeThrough', false, null)"><s>S</s></button>
                </div>
                <div id="editExemplo" class="campo div-editor" contenteditable="true"></div>
            </div>

            <button class="btn-add" onclick="enviarEdicao()">Salvar Modificação</button>
            <button class="btn-cancelar" onclick="fecharModal('modalEdicao')">Cancelar</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalCompleto">
        <div class="modal-box" id="boxCompleto">
            <button class="btn-fechar-x" onclick="fecharModal('modalCompleto')">✖</button>
            <div class="comp-palavra" id="compPalavra"></div>
            <div class="comp-significado" id="compSignificado"></div>
            <div class="comp-exemplo" id="compExemplo"></div>
            
            <div id="compAcoes" class="card-acoes" style="margin-top: 25px; margin-bottom: 10px;"></div>
            
            <button class="btn-cancelar" onclick="fecharModal('modalCompleto')">Fechar</button>
        </div>
    </div>

    <script>
        const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbzstpIw7NBIIELMLisCHz4Gk6PbH6D0FSWtPaW2CXN0ehnDyOg-1pJ_qCZhVgp73wV1/exec"; 
        
        let palavrasGlobais = [];
        let paginaAtual = 1;
        const itensPorPagina = 9;

        const paletaCores = [
            '#fbf8cc', '#fde4cf', '#ffcfd2', '#f1c0e8', '#cfbaf0', '#a3c4f3', '#90dbf4', '#8eecf5', '#98f5e1', '#b9fbc0',
            '#e0ece4', '#f7f2e7', '#dbe4e9', '#e4e6d4', '#f1e9e5', '#e8dff5', '#fce1e4', '#fcf4dd', '#ddedea', '#daeaf6',
            '#eef2f3', '#f5eef8', '#e8f8f5', '#eaf2f8', '#fef9e7', '#fdedec', '#fdf2e9', '#ebf5fb', '#e8eaed', '#f2f3f4',
            '#fae3d9', '#ffb6b9', '#bbded6', '#8ac6d1', '#fff1ac', '#f9bcdd', '#d5a4cf', '#b689b0', '#f4e8c1', '#a0c1b8',
            '#f0e6ef', '#e4c1f9', '#d3f8e2', '#e4c1f9', '#f694c1', '#ede7b1', '#a9def9', '#e4f1ee', '#ffc8dd', '#ffafcc'
        ];

        function escapeHTML(str) {
            if(!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // A MÁGICA FOI AQUI: Expandimos a lista de tags aceitas para garantir que o formato do celular e do PC funcionem igual
        function processarTextoFinal(str) {
            if(!str) return '';
            let seguro = escapeHTML(str);
            return seguro
                .replace(/&lt;b&gt;/gi, '<b>').replace(/&lt;\/b&gt;/gi, '</b>')
                .replace(/&lt;strong&gt;/gi, '<strong>').replace(/&lt;\/strong&gt;/gi, '</strong>')
                .replace(/&lt;i&gt;/gi, '<i>').replace(/&lt;\/i&gt;/gi, '</i>')
                .replace(/&lt;em&gt;/gi, '<em>').replace(/&lt;\/em&gt;/gi, '</em>')
                .replace(/&lt;s&gt;/gi, '<s>').replace(/&lt;\/s&gt;/gi, '</s>')
                .replace(/&lt;strike&gt;/gi, '<strike>').replace(/&lt;\/strike&gt;/gi, '</strike>')
                .replace(/&lt;del&gt;/gi, '<del>').replace(/&lt;\/del&gt;/gi, '</del>')
                .replace(/&lt;u&gt;/gi, '<u>').replace(/&lt;\/u&gt;/gi, '</u>')
                .replace(/&lt;div&gt;/gi, '<div>').replace(/&lt;\/div&gt;/gi, '</div>')
                .replace(/&lt;br\s*[\/]?&gt;/gi, '<br>');
        }

        function formatarFrase(str) {
            if(!str) return '';
            let t = str.trim();
            if(t.length === 0) return '';
            
            t = t.replace(/^((?:<\w+>)*\s*)(.)/, function(match, tags, letra) {
                return tags + letra.toUpperCase();
            });
            
            let textoSemTagFinal = t.replace(/(<\/\w+>)+$/, '');
            if (!/[.!?]$/.test(textoSemTagFinal)) {
                t = textoSemTagFinal + '.' + t.substring(textoSemTagFinal.length);
            }
            return t;
        }

        function formatarExemploVisu(exRaw) {
            if (!exRaw || exRaw === '-') return '';
            return exRaw.split('\n')
                .filter(l => l.trim() !== '')
                .map(l => {
                    let texto = l.trim().replace(/^[\*\-●]\s*/, '');
                    return '● ' + formatarFrase(texto);
                }).join('\n');
        }

        document.addEventListener('DOMContentLoaded', function() {
            if(localStorage.getItem('temaNoturno') === 'true') {
                document.body.classList.add('dark-mode');
            }
            carregarDaNuvem();

            const txtExemplo = document.getElementById('exemplo');
            const txtEditExemplo = document.getElementById('editExemplo');

            function handleEnterBolinha(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.execCommand('insertText', false, '\n● ');
                }
            }
            
            function handleFocusBolinha() {
                if (this.innerText.trim() === '') {
                    this.innerHTML = '● ';
                    let range = document.createRange();
                    let sel = window.getSelection();
                    range.selectNodeContents(this);
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }

            function handlePaste(e) {
                e.preventDefault();
                let text = (e.originalEvent || e).clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            }

            [txtExemplo, txtEditExemplo].forEach(el => {
                if(el) {
                    el.addEventListener('keydown', handleEnterBolinha);
                    el.addEventListener('focus', handleFocusBolinha);
                    el.addEventListener('paste', handlePaste);
                }
            });

            const txtSig = document.getElementById('significado');
            const txtEditSig = document.getElementById('editSignificado');
            [txtSig, txtEditSig].forEach(el => {
                if(el) el.addEventListener('paste', handlePaste);
            });
        });

        function toggleTema() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('btnTema').innerText = isDark ? '☀️' : '🌙';
            localStorage.setItem('temaNoturno', isDark);
        }

        function obterCorFixa(palavra) {
            let hash = 0;
            for (let i = 0; i < palavra.length; i++) hash = palavra.charCodeAt(i) + ((hash << 5) - hash);
            return paletaCores[Math.abs(hash) % paletaCores.length];
        }

        function salvarNaNuvem() {
            const pal = document.getElementById('palavra').value.trim();
            const sig = document.getElementById('significado').innerHTML.trim();
            const ex = document.getElementById('exemplo').innerHTML.trim();

            if(!pal || !sig) return alert("Preencha palavra e significado!");

            const idTemporario = "temp-" + Date.now();
            palavrasGlobais.unshift({ row: idTemporario, palavra: pal, significado: sig, exemplo: ex });
            
            paginaAtual = 1;
            renderizarNaTela(palavrasGlobais);

            document.getElementById('palavra').value = '';
            document.getElementById('significado').innerHTML = '';
            document.getElementById('exemplo').innerHTML = '';

            const url = `${GOOGLE_APP_URL}?action=salvar&palavra=${encodeURIComponent(pal)}&significado=${encodeURIComponent(sig)}&exemplo=${encodeURIComponent(ex)}`;
            fetch(url).then(r => r.json()).then(() => { carregarDaNuvemBaixoPano(); });
        }

        function carregarDaNuvem() {
            const cache = localStorage.getItem('dicionarioCache');
            if (cache) {
                palavrasGlobais = JSON.parse(cache);
                renderizarNaTela(palavrasGlobais);
            }
            fetch(`${GOOGLE_APP_URL}?action=ler`).then(r => r.json()).then(dados => {
                palavrasGlobais = dados;
                localStorage.setItem('dicionarioCache', JSON.stringify(dados)); 
                renderizarNaTela(palavrasGlobais); 
            }).catch(e => console.log("Carregado via cache."));
        }

        function carregarDaNuvemBaixoPano() {
            fetch(`${GOOGLE_APP_URL}?action=ler`).then(r => r.json()).then(dados => { 
                palavrasGlobais = dados; 
                localStorage.setItem('dicionarioCache', JSON.stringify(dados));
            });
        }

        function abrirEdicao(row) {
            if (String(row).startsWith('temp-')) return alert("Aguarde salvamento.");
            const item = palavrasGlobais.find(i => i.row == row);
            if(!item) return;

            document.getElementById('editRow').value = item.row;
            document.getElementById('editPalavra').value = item.palavra;
            document.getElementById('editSignificado').innerHTML = item.significado;
            
            let oldEx = (item.exemplo === '-' || !item.exemplo) ? '' : item.exemplo;
            if(oldEx !== '') {
                oldEx = oldEx.split('\n').map(l => {
                    let t = l.trim();
                    if(t !== '' && t.indexOf('●') === -1) {
                        t = '● ' + t.replace(/^[\*\-]\s*/, '');
                    }
                    return t;
                }).join('\n');
            }
            document.getElementById('editExemplo').innerHTML = oldEx;
            
            document.getElementById('modalEdicao').style.display = 'flex';
        }
        
        function abrirEdicaoDoModal(row) {
            fecharModal('modalCompleto');
            abrirEdicao(row);
        }

        function enviarEdicao() {
            const row = document.getElementById('editRow').value;
            const pal = document.getElementById('editPalavra').value.trim();
            const sig = document.getElementById('editSignificado').innerHTML.trim();
            const ex = document.getElementById('editExemplo').innerHTML.trim();

            fecharModal('modalEdicao'); 

            const index = palavrasGlobais.findIndex(item => item.row == row);
            if(index !== -1) {
                palavrasGlobais[index] = { row: row, palavra: pal, significado: sig, exemplo: ex };
                const busca = document.getElementById('campoBusca').value.toLowerCase();
                if(busca !== "") filtrarLista(); else renderizarNaTela(palavrasGlobais);
            }

            const url = `${GOOGLE_APP_URL}?action=editar&row=${row}&palavra=${encodeURIComponent(pal)}&significado=${encodeURIComponent(sig)}&exemplo=${encodeURIComponent(ex)}`;
            fetch(url).then(r => r.json()).then(() => { carregarDaNuvemBaixoPano(); });
        }

        function apagarPalavra(row) {
            if(confirm("Tem certeza que deseja apagar permanentemente esta palavra?")) {
                fecharModal('modalCompleto');
                
                palavrasGlobais = palavrasGlobais.filter(item => item.row != row);
                const busca = document.getElementById('campoBusca').value.toLowerCase();
                if(busca !== "") filtrarLista(); else renderizarNaTela(palavrasGlobais);
                
                const url = `${GOOGLE_APP_URL}?action=apagar&row=${row}`;
                fetch(url).then(r => r.json()).then(() => { carregarDaNuvemBaixoPano(); });
            }
        }

        function abrirVisaoCompleta(row) {
            const item = palavrasGlobais.find(i => i.row == row);
            if(!item) return;

            document.getElementById('boxCompleto').style.backgroundColor = obterCorFixa(item.palavra);
            document.getElementById('compPalavra').innerText = item.palavra;
            
            document.getElementById('compSignificado').innerHTML = processarTextoFinal(formatarFrase(item.significado));
            
            const divExemplo = document.getElementById('compExemplo');
            if (item.exemplo && item.exemplo !== '-' && item.exemplo.trim() !== '') {
                divExemplo.style.display = 'block'; 
                divExemplo.innerHTML = processarTextoFinal(formatarExemploVisu(item.exemplo));
            } else {
                divExemplo.style.display = 'none';
            }

            document.getElementById('compAcoes').innerHTML = `
                <button class="btn-acao" onclick="copiarPalavra('${item.row}', this)">📋 Copiar</button>
                <button class="btn-acao" onclick="abrirEdicaoDoModal('${item.row}')">✏️ Editar</button>
                <button class="btn-acao" onclick="baixarImagem('${item.row}', this)">📥 Baixar</button>
                <button class="btn-acao" style="background: rgba(239, 68, 68, 0.15); color: #b91c1c;" onclick="apagarPalavra('${item.row}')">🗑️ Apagar</button>
            `;

            document.getElementById('modalCompleto').style.display = 'flex';
        }

        function fecharModal(idModal) { document.getElementById(idModal).style.display = 'none'; }

        function copiarPalavra(row, btnElement) {
            const item = palavrasGlobais.find(i => i.row == row);
            if(!item) return;
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = item.significado;
            navigator.clipboard.writeText(`${item.palavra} = ${tempDiv.innerText}`).then(() => {
                const textoOriginal = btnElement.innerHTML;
                btnElement.innerHTML = '✅ Copiado';
                setTimeout(() => { btnElement.innerHTML = textoOriginal; }, 2000);
            });
        }

        function filtrarLista() {
            paginaAtual = 1; 
            const busca = document.getElementById('campoBusca').value.toLowerCase();
            renderizarNaTela(palavrasGlobais.filter(item => 
                item.palavra.toLowerCase().includes(busca) || item.significado.toLowerCase().includes(busca)
            ));
        }

        function mudarPagina(direcao) {
            const busca = document.getElementById('campoBusca').value.toLowerCase();
            const arrayAtual = palavrasGlobais.filter(item => 
                item.palavra.toLowerCase().includes(busca) || item.significado.toLowerCase().includes(busca)
            );
            
            const totalPaginas = Math.ceil(arrayAtual.length / itensPorPagina);
            let novaPagina = paginaAtual + direcao;
            
            if (novaPagina >= 1 && novaPagina <= totalPaginas) {
                paginaAtual = novaPagina;
                renderizarNaTela(arrayAtual);
            }
        }

        function renderizarNaTela(arrayDados) {
            const lista = document.getElementById('minhaLista');
            const divPaginacao = document.getElementById('paginacao');
            lista.innerHTML = ''; divPaginacao.innerHTML = '';

            const totalPaginas = Math.ceil(arrayDados.length / itensPorPagina);
            if (paginaAtual > totalPaginas && totalPaginas > 0) paginaAtual = totalPaginas;

            const inicioIndex = (paginaAtual - 1) * itensPorPagina;
            const itensPagina = arrayDados.slice(inicioIndex, inicioIndex + itensPorPagina);

            itensPagina.forEach(item => {
                const li = document.createElement('li');
                li.className = 'card';
                li.style.backgroundColor = obterCorFixa(item.palavra); 
                
                li.onclick = function() { abrirVisaoCompleta(item.row); };

                let sigFormatado = formatarFrase(item.significado);
                let temExemplo = (item.exemplo && item.exemplo.trim() !== '' && item.exemplo !== '-');
                
                let htmlExemplo = '';
                if(temExemplo) {
                    let exFormatado = formatarExemploVisu(item.exemplo);
                    htmlExemplo = `<div class="card-exemplo">${processarTextoFinal(exFormatado)}</div>`;
                }

                li.innerHTML = `
                    <div class="card-header">
                        <div class="card-palavra" title="${escapeHTML(item.palavra)}">${processarTextoFinal(item.palavra)}</div>
                    </div>
                    <div class="card-significado">${processarTextoFinal(sigFormatado)}</div>
                    ${htmlExemplo}
                `;
                lista.appendChild(li);
            });

            const slotsVazios = itensPorPagina - itensPagina.length;
            for(let i = 0; i < slotsVazios; i++) {
                const emptyLi = document.createElement('li');
                emptyLi.className = 'card empty-card'; 
                emptyLi.style.visibility = 'hidden';
                emptyLi.style.pointerEvents = 'none';
                lista.appendChild(emptyLi);
            }

            if (totalPaginas > 1) {
                let maxVisiveis = 9;
                let startPage = Math.max(1, paginaAtual - Math.floor(maxVisiveis / 2));
                let endPage = startPage + maxVisiveis - 1;

                if (endPage > totalPaginas) {
                    endPage = totalPaginas;
                    startPage = Math.max(1, endPage - maxVisiveis + 1);
                }

                for(let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'btn-pag' + (i === paginaAtual ? ' ativo' : '');
                    btn.innerText = i;
                    btn.onclick = () => { paginaAtual = i; renderizarNaTela(arrayDados); };
                    divPaginacao.appendChild(btn);
                }
            }

            const fabPrev = document.getElementById('fabPrev');
            const fabNext = document.getElementById('fabNext');
            
            if (fabPrev && fabNext) {
                fabPrev.style.display = (paginaAtual > 1) ? 'flex' : 'none';
                fabNext.style.display = (paginaAtual < totalPaginas) ? 'flex' : 'none';
            }
        }

        function baixarImagem(row, btnElement) {
            const item = palavrasGlobais.find(i => i.row == row);
            if(!item) return;

            const textoOriginal = btnElement.innerHTML;
            btnElement.innerHTML = '⏳ Gerando...';

            const tempDiv = document.createElement('div');
            const bgColor = obterCorFixa(item.palavra);
            
            Object.assign(tempDiv.style, {
                width: '1080px',
                height: '1350px',
                backgroundColor: bgColor,
                position: 'fixed',
                top: '-9999px',
                left: '-9999px',
                display: 'flex',
                flexDirection: 'column',
                justifyContent: 'center', 
                padding: '120px',
                boxSizing: 'border-box',
                fontFamily: "'Nunito', sans-serif",
                color: '#111827',
                zIndex: '-1'
            });

            let sigFormatado = formatarFrase(item.significado);
            
            let htmlExemplo = '';
            if (item.exemplo && item.exemplo !== '-' && item.exemplo.trim() !== '') {
                const linhas = item.exemplo.split('\n').filter(l => l.trim() !== '');
                
                const linhasFormatadas = linhas.map((linha, index) => {
                    let texto = linha.trim().replace(/^[\*\-●]\s*/, '');
                    texto = formatarFrase(texto); 
                    
                    let marginBottom = (index === linhas.length - 1) ? '0' : '20px';
                    
                    return `
                        <div style="display: flex; align-items: flex-start; gap: 20px; margin-bottom: ${marginBottom}; text-align: left;">
                            <span style="color: #374151; font-size: 30px; line-height: 1.6; padding-top: 3px;">●</span>
                            <span style="flex: 1;">${processarTextoFinal(texto)}</span>
                        </div>
                    `;
                }).join('');

                htmlExemplo = `
                    <div style="background: rgba(255,255,255,0.5); padding: 50px; border-radius: 30px; font-style: italic; font-size: 45px; color: #374151; line-height: 1.5; width: 100%; box-sizing: border-box;">
                        ${linhasFormatadas}
                    </div>
                `;
            }

            tempDiv.innerHTML = `
                <div style="width: 100%; display: flex; flex-direction: column;">
                    <div style="font-size: 110px; font-weight: 900; color: #111827; margin-bottom: 15px;">${processarTextoFinal(item.palavra)}</div>
                    <div style="font-size: 55px; line-height: 1.5; color: #111827; margin-bottom: 50px;">${processarTextoFinal(sigFormatado)}</div>
                    ${htmlExemplo}
                </div>
            `;

            document.body.appendChild(tempDiv);

            html2canvas(tempDiv, { scale: 1, backgroundColor: bgColor }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Palavra_${item.palavra.replace(/<[^>]*>?/gm, '')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                document.body.removeChild(tempDiv);
                btnElement.innerHTML = '✅ Baixado!';
                setTimeout(() => { btnElement.innerHTML = textoOriginal; }, 2000);
            }).catch(err => {
                console.error(err);
                btnElement.innerHTML = '❌ Erro';
                setTimeout(() => { btnElement.innerHTML = textoOriginal; }, 2000);
            });
        }
    </script>
</body>
</html>
